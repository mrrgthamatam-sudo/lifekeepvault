    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[LifeKeepVault] Service Worker registered:', reg.scope);
            })
            .catch((err) => {
              console.log('[LifeKeepVault] SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
